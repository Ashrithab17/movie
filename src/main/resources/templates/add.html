<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Movie</title>
</head>
<body>
	<div class="container">
		<h1>Add New Movie</h1>

		<form th:action="@{/movie/add}" th:object="${movie}" method="post">
			<div class="form-group">
				<label for="name">Movie Name</label>
				<input type="text" id="name" name="name" placeholder="Enter movie name" required>
			</div>

			<div class="form-group">
				<label for="actor">Actor</label>
				<input type="text" id="actor" name="actor" placeholder="Enter actor name" required>
			</div>

			<div class="form-group">
				<label for="rating">Rating</label>
				<input type="number" id="rating" name="rating" placeholder="Enter rating" required>
			</div>

	        <div class="form-group">
		        <label>Poster Image Link:</label>
		     <input type="text" th:field="*{imageLink}" placeholder="example.jpg">
			</div>
			<div class="button-group">
				<button type="submit">Add Movie</button>
				<a th:href="@{/movie}">Back</a>
			</div>
		</form>
	</div>
</body>
</html>
