<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movie Collection</title>
</head>
<body>

<div align="center">
    <h1>Movie Collection</h1>

    <div th:if="${message}" th:text="${message}"></div>

    <div th:if="${not #lists.isEmpty(movies)}">
        <div th:each="movie : ${movies}">
            <h3 th:text="${movie.name}"></h3>
            <p><strong>Actor:</strong> <span th:text="${movie.actor}"></span></p>
            <p><strong>Rating:</strong> <span th:text="${movie.rating}"></span></p>

            <a th:href="@{/movie/edit/{id}(id=${movie.id})}">Edit</a>

            <form th:action="@{/movie/delete/{id}(id=${movie.id})}" method="post" style="display:inline">
                <button type="submit">Delete</button>
            </form>

            <hr/>
        </div>
    </div>

    <a th:href="@{/movie/add}">Add New Movie</a>
                
    
</div>

</body>
</html>
