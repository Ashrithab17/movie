<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Edit Movie</title>
</head>
<body>
	<div class="container">
		<h1>Edit Movie</h1>

		<form th:action="@{/movie/update/{id}(id=${movie.id})}" method="post">
    <input type="hidden" name="id" th:value="${movie.id}" />

    <div class="form-group">
        <label for="name">Movie Name</label>
        <input type="text" id="name" name="name" th:value="${movie.name}" required>
    </div> 
    
    <div class="form-group">
        <label for="actor">Actor</label>
        <input type="text" id="actor" name="actor" th:value="${movie.actor}" required>
    </div>
    
    <div class="form-group">
        <label for="rating">Rating</label>
        <input type="number" id="rating" name="rating" th:value="${movie.rating}" required>
    </div>

    <div class="button-group">
        <button type="submit">Update Movie</button>
        <a href="/" class="btn-back">Back</a>
    </div>
</form>
			
		</form>
	</div>
</body>
</html>
