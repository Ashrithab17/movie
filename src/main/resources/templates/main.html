<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movie Collection</title>

    <style>
        body {
            font-family: Arial;
            background-color: #32988B;
        }
        h1 {
            text-align: center;
        }
        table {
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
        }

        th, td {
            border: 1px solid gray;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color:#57C785;
            color: white;
        }

        img {
            border-radius: 5px;
        }

        .btn {
            padding: 5px 10px;
            text-decoration: none;
            color: white;
            border-radius: 4px;
        }

        .edit-btn {
            background-color: blue;
        }

        .delete-btn {
            background-color: red;
        }

        .add-btn {
            background-color:#57C785;
            padding: 8px 15px;
        }

        .center {
            text-align: center;
            margin-top: 20px;
        }
    </style>

</head>
<body>

<h1>🎬 Movie Collection</h1>

<div th:if="${message}" style="text-align:center; color:black;">
    <p th:text="${message}"></p>
</div>

<div th:if="${not #lists.isEmpty(movies)}">

    <table>
        <tr>
            <th>Poster</th>
            <th>Movie Name</th>
            <th>Actor</th>
            <th>Rating</th>
            <th>Actions</th>
        </tr>

        <tr th:each="movie : ${movies}">
            <td>
                <img th:src="@{'/images/' + ${movie.imageLink}}" width="80" height="100">
            </td>

            <td th:text="${movie.name}"></td>

            <td th:text="${movie.actor}"></td>

            <td th:text="${movie.rating}"></td>

            <td>
                <a th:href="@{/movie/edit/{id}(id=${movie.id})}"
                   class="btn edit-btn">Edit</a>

                <form th:action="@{/movie/delete/{id}(id=${movie.id})}"
                      method="post"
                      style="display:inline">

                    <button type="submit"
                            class="btn delete-btn"
                            onclick="return confirm('Are you sure?')">
                        Delete
                    </button>

                </form>
            </td>
        </tr>

    </table>

</div>

<div class="center">
    <br>
    <a th:href="@{/movie/add}" class="btn add-btn">Add New Movie</a>
</div>

</body>
</html>
